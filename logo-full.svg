<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="blueOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="blueOrangeV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="blueOrangeR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background (optional - remove for transparent) -->
  <rect width="512" height="512" rx="80" fill="#0f172a"/>
  
  <!-- Stylized PS Icon -->
  <g transform="translate(256, 256)">
    <!-- P letter - main shape -->
    <path d="M-80 -100 L-80 100 L-40 100 L-40 20 L20 20 C60 20, 80 0, 80 -40 C80 -80, 60 -100, 20 -100 L-80 -100 Z" 
          fill="url(#blueOrange)"/>
    
    <!-- S letter - overlapping -->
    <path d="M30 -30 C30 -60, 60 -80, 80 -80 C100 -80, 110 -70, 110 -60 C110 -50, 100 -45, 80 -40 L100 -40 C130 -40, 150 -20, 150 10 C150 40, 130 60, 100 60 C70 60, 50 45, 50 20 L10 20 C10 50, 30 70, 60 70 C90 70, 100 60, 100 50 C100 40, 90 35, 70 30 C50 25, 30 10, 30 -30 Z" 
          fill="url(#blueOrangeR)" opacity="0.95"/>
    
    <!-- Accent dot -->
    <circle cx="60" cy="-60" r="12" fill="#f97316"/>
  </g>
</svg>
